        var LAYER_DOMAIN_MAP = [{"layer":"Decision translation and societal context","domains":["Intervention design, effectiveness, and feasibility","Societal impact and proportionality"]},{"layer":"Situational awareness","domains":["Epidemiological situation and risk surveillance","Mobility determinants and population behavior"]},{"layer":"System and response readiness","domains":["Medical countermeasures, stockpiles, and supply chains","Operational readiness and delivery capacity"]}];

        // Populate Layer dropdown from the R-built map
        var layerSel  = document.getElementById('layerSel');
        var domainSel = document.getElementById('domainSel');

        LAYER_DOMAIN_MAP.forEach(function(entry) {
          var opt = document.createElement('option');
          opt.value = entry.layer;
          opt.textContent = entry.layer;
          layerSel.appendChild(opt);
        });

        function populateDomains(layerVal) {
          domainSel.innerHTML = '<option value="">— All domains —</option>';
          var doms = [];
          if (layerVal === '') {
            LAYER_DOMAIN_MAP.forEach(function(e) {
              e.domains.forEach(function(d) {
                if (doms.indexOf(d) === -1) doms.push(d);
              });
            });
            doms.sort();
          } else {
            var entry = LAYER_DOMAIN_MAP.filter(function(e) {
              return e.layer === layerVal;
            })[0];
            if (entry) doms = entry.domains.slice();
          }
          doms.forEach(function(d) {
            var opt = document.createElement('option');
            opt.value = d; opt.textContent = d;
            domainSel.appendChild(opt);
          });
        }
        populateDomains('');

        // Poll until visNetwork has finished initialising and attached its
        // vis.Network instance to the container element as .chart
        var HIDDEN    = 'rgba(210,210,210,0.15)';
        var origColor = {};
        var origGroup = {};
        var nodesDS, network;

        var initIv = setInterval(function() {
          var visCont = document.querySelector('#net-wrapper .visNetwork');
          if (visCont && visCont.chart) {
            network = visCont.chart;
            nodesDS = network.body.data.nodes;

            // Snapshot original colours AND groups from the live DataSet.
            // We need origGroup because in vis.js group styling takes precedence
            // over individual node colour — setting color alone on a grouped node
            // has no visible effect. The fix is to set group=null when hiding
            // (forcing vis.js to use the node's own color property) and restore
            // the original group when showing again.
            nodesDS.forEach(function(n) {
              origColor[n.id] = {
                background: (n.color && n.color.background) || '#aaa',
                border:     (n.color && n.color.border)     || '#888'
              };
              origGroup[n.id] = n.group || null;
            });

            // Disable physics once layout has stabilised
            network.once('stabilizationIterationsDone', function() {
              network.setOptions({ physics: { enabled: false } });
            });
            setTimeout(function() {
              network.setOptions({ physics: { enabled: false } });
            }, 8000);

            clearInterval(initIv);
          }
        }, 150);

        // Filter: fade non-matching InfoNeed nodes; DataNeed / Dataset nodes
        // have no entry in NODE_META and are always shown at full opacity.
        function applyFilters() {
          if (!nodesDS) return;
          var lv = layerSel.value;
          var dv = domainSel.value;
          var updates = [];
          nodesDS.forEach(function(n) {
            var meta = NODE_META[n.id];
            var show = true;
            if (meta) {
              if (lv !== '' && meta.layer  !== lv) show = false;
              if (dv !== '' && meta.domain !== dv) show = false;
            }
            if (show) {
              updates.push({ id: n.id,
                group: origGroup[n.id],
                color: { background: origColor[n.id].background,
                         border:     origColor[n.id].border }
              });
            } else {
              updates.push({ id: n.id,
                group: null,
                color: { background: HIDDEN, border: HIDDEN }
              });
            }
          });
          nodesDS.update(updates);
        }

        layerSel.addEventListener('change', function() {
          populateDomains(layerSel.value);
          applyFilters();
        });
        domainSel.addEventListener('change', applyFilters);

        document.getElementById('resetBtn').addEventListener('click', function() {
          layerSel.value  = '';
          populateDomains('');
          domainSel.value = '';
          if (!nodesDS) return;
          var updates = [];
          nodesDS.forEach(function(n) {
            updates.push({ id: n.id,
              group: origGroup[n.id],
              color: { background: origColor[n.id].background,
                       border:     origColor[n.id].border }
            });
          });
          nodesDS.update(updates);
        });
